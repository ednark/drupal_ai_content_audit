ai_site_audit.dashboard:
  path: '/admin/reports/ai-site-audit'
  defaults:
    _controller: '\Drupal\ai_site_audit\Controller\SiteAuditDashboardController::dashboard'
    _title: 'Sitewide AI Audit Dashboard'
  requirements:
    _permission: 'view site audit dashboard+administer ai content audit'
  options:
    _admin_route: TRUE

ai_site_audit.refresh_stats:
  path: '/admin/reports/ai-site-audit/refresh-stats'
  defaults:
    _controller: '\Drupal\ai_site_audit\Controller\SiteAuditDashboardController::refreshStats'
  requirements:
    _permission: 'run site audit analysis+administer ai content audit'
  methods: [POST]
  options:
    _admin_route: TRUE

ai_site_audit.ai_insights:
  path: '/admin/reports/ai-site-audit/ai-insights'
  defaults:
    _controller: '\Drupal\ai_site_audit\Controller\SiteAuditDashboardController::aiInsights'
  requirements:
    _permission: 'view site audit dashboard+administer ai content audit'
  options:
    _admin_route: TRUE

ai_site_audit.trigger_analysis:
  path: '/admin/reports/ai-site-audit/trigger-analysis'
  defaults:
    _controller: '\Drupal\ai_site_audit\Controller\SiteAuditDashboardController::triggerAnalysis'
  requirements:
    _permission: 'run site audit analysis+administer ai content audit'
  methods: [POST]
  options:
    _admin_route: TRUE

ai_site_audit.analysis_status:
  path: '/admin/reports/ai-site-audit/analysis-status'
  defaults:
    _controller: '\Drupal\ai_site_audit\Controller\SiteAuditDashboardController::analysisStatus'
  requirements:
    _permission: 'view site audit dashboard+administer ai content audit'
  options:
    _admin_route: TRUE

ai_site_audit.settings:
  path: '/admin/config/ai/site-audit'
  defaults:
    _form: '\Drupal\ai_site_audit\Form\SiteAuditSettingsForm'
    _title: 'AI Site Audit Settings'
  requirements:
    _permission: 'administer ai content audit'
  options:
    _admin_route: TRUE

ai_site_audit.export:
  path: '/admin/reports/ai-site-audit/export/{format}'
  defaults:
    _controller: '\Drupal\ai_site_audit\Controller\SiteAuditDashboardController::exportReport'
  requirements:
    _permission: 'view site audit dashboard+administer ai content audit'
    format: 'csv|json'
  options:
    _admin_route: TRUE

ai_site_audit.content_type_comparison:
  path: '/admin/reports/ai-site-audit/content-types'
  defaults:
    _controller: '\Drupal\ai_site_audit\Controller\SiteAuditDashboardController::contentTypeComparison'
    _title: 'Content Type Comparison'
  requirements:
    _permission: 'view site audit dashboard+administer ai content audit'
  options:
    _admin_route: TRUE
